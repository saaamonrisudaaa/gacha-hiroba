# X（旧Twitter）手動APIフォールバック
# - 定時投稿はCodexのChrome自動化（08:57 / 12:05 / 16:31 JST）が各枠1件だけ実行
# - このworkflowは定時実行せず、障害時の手動フォールバックだけに使用
# - 1回の実行につきサイトURL付き投稿を1件だけ処理
# - 投稿済み文面は data/x-posted-log.json に記録し、同一文面の再投稿を防ぐ
name: x-auto-post

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（1 = 投稿せず文面確認のみ）'
        type: choice
        options: ['1', '0']
        default: '1'
      slot:
        description: '投稿枠（due = 現在時刻の定時枠）'
        type: choice
        options: ['due', 'morning', 'noon', 'afternoon', 'evening']
        default: 'due'
      verify_only:
        description: '投稿せず @gachahiroba の認証だけ確認'
        type: choice
        options: ['0', '1']
        default: '0'

permissions:
  contents: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate post rules and queue
        run: |
          node --test tools/*.test.mjs
          node tools/validate-x-posts.mjs

      - name: Resolve post slot
        id: resolve-slot
        shell: bash
        env:
          INPUT_SLOT: ${{ inputs.slot }}
        run: |
          slot="${INPUT_SLOT:-due}"
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Post once to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_EXPECTED_USERNAME: gachahiroba
          X_SLOT: ${{ steps.resolve-slot.outputs.slot }}
          X_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '0' }}
          X_VERIFY_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_only || '0' }}
        run: |
          git config user.name "gacha-hiroba-bot"
          git config user.email "actions@users.noreply.github.com"

          persist_state() {
            local current_position="$1"
            git add data/x-posts.json data/x-posted-log.json
            if git diff --cached --quiet; then
              return 0
            fi
            git commit -m "x-post: persist ${current_position}/1 [skip ci]"
            for attempt in 1 2 3; do
              if ! git pull --rebase origin "$GITHUB_REF_NAME"; then
                git rebase --abort || true
                if [[ "$attempt" -lt 3 ]]; then sleep 2; fi
                continue
              fi
              node tools/validate-x-posts.mjs
              if git push; then
                return 0
              fi
              if [[ "$attempt" -lt 3 ]]; then sleep 2; fi
            done
            echo "Failed to persist X post ${current_position}/1 after 3 attempts" >&2
            return 1
          }

          if [[ "$X_VERIFY_ONLY" == "1" ]]; then
            X_POST_POSITION=1 node tools/post-to-x.mjs
            exit 0
          fi

          X_POST_POSITION=1 node tools/post-to-x.mjs
          persist_state "1"
