# X（旧Twitter）自動投稿：毎日 7:30 / 12:30 / 15:30 / 19:30 JST
# - data/x-posts.json のキューを優先して投稿し、使った分をコミットで消し込む
# - キューが空の時間帯は実データから自動生成
# - GitHub Actions の cron は数分〜十数分遅れることがあります（自然なゆらぎとして許容）
name: x-auto-post

on:
  schedule:
    - cron: '30 22 * * *'   # 07:30 JST
    - cron: '30 3 * * *'    # 12:30 JST
    - cron: '30 6 * * *'    # 15:30 JST
    - cron: '30 10 * * *'   # 19:30 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（1 = 投稿せず文面確認のみ）'
        default: '1'

permissions:
  contents: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Post to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.dry_run || '' }}
        run: node tools/post-to-x.mjs

      - name: Commit queue update
        run: |
          if ! git diff --quiet data/x-posts.json; then
            git config user.name "gacha-hiroba-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data/x-posts.json
            git commit -m "x-post: consume queue item [skip ci]"
            git push
          fi
