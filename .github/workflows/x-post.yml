# X（旧Twitter）自動投稿：毎日 7:30 / 12:30 / 15:30 / 19:30 JST
# - 各枠3投稿。1件目はサイトURL付き、2・3件目はURLなし、各投稿の間隔は2分
# - 1件目は data/x-posts.json のキューを優先し、2・3件目は実データから自動生成
# - 投稿済み文面は data/x-posted-log.json に記録し、同一文面の再投稿を防ぐ
# - GitHub Actions の cron は数分〜十数分遅れることがあります（自然なゆらぎとして許容）
name: x-auto-post

on:
  schedule:
    - cron: '30 22 * * *'   # 07:30 JST
    - cron: '30 3 * * *'    # 12:30 JST
    - cron: '30 6 * * *'    # 15:30 JST
    - cron: '30 10 * * *'   # 19:30 JST
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'ドライラン（1 = 投稿せず文面確認のみ）'
        type: choice
        options: ['1', '0']
        default: '1'
      slot:
        description: '投稿枠（due = 現在時刻の定時枠）'
        type: choice
        options: ['due', 'morning', 'noon', 'afternoon', 'evening']
        default: 'due'
      verify_only:
        description: '投稿せず @gachahiroba の認証だけ確認'
        type: choice
        options: ['0', '1']
        default: '0'

permissions:
  contents: write

concurrency:
  group: x-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate post rules and queue
        run: |
          node --test tools/*.test.mjs
          node tools/validate-x-posts.mjs

      - name: Resolve post slot
        id: resolve-slot
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_SCHEDULE: ${{ github.event.schedule }}
          INPUT_SLOT: ${{ inputs.slot }}
        run: |
          if [[ "$EVENT_NAME" == "schedule" ]]; then
            case "$EVENT_SCHEDULE" in
              '30 22 * * *') slot='morning' ;;
              '30 3 * * *') slot='noon' ;;
              '30 6 * * *') slot='afternoon' ;;
              '30 10 * * *') slot='evening' ;;
              *) echo "Unknown schedule: $EVENT_SCHEDULE" >&2; exit 1 ;;
            esac
          else
            slot="${INPUT_SLOT:-due}"
          fi
          echo "slot=$slot" >> "$GITHUB_OUTPUT"

      - name: Post three times to X
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_SECRET: ${{ secrets.X_ACCESS_SECRET }}
          X_EXPECTED_USERNAME: gachahiroba
          X_SLOT: ${{ steps.resolve-slot.outputs.slot }}
          X_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || '0' }}
          X_VERIFY_ONLY: ${{ github.event_name == 'workflow_dispatch' && inputs.verify_only || '0' }}
        run: |
          git config user.name "gacha-hiroba-bot"
          git config user.email "actions@users.noreply.github.com"

          persist_state() {
            local current_position="$1"
            git add data/x-posts.json data/x-posted-log.json
            if git diff --cached --quiet; then
              return 0
            fi
            git commit -m "x-post: persist ${current_position}/3 [skip ci]"
            for attempt in 1 2 3; do
              if ! git pull --rebase origin "$GITHUB_REF_NAME"; then
                git rebase --abort || true
                if [[ "$attempt" -lt 3 ]]; then sleep 2; fi
                continue
              fi
              node tools/validate-x-posts.mjs
              if git push; then
                return 0
              fi
              if [[ "$attempt" -lt 3 ]]; then sleep 2; fi
            done
            echo "Failed to persist X post ${current_position}/3 after 3 attempts" >&2
            return 1
          }

          if [[ "$X_VERIFY_ONLY" == "1" ]]; then
            X_POST_POSITION=1 node tools/post-to-x.mjs
            exit 0
          fi

          for position in 1 2 3; do
            X_POST_POSITION="$position" node tools/post-to-x.mjs
            persist_state "$position"
          done
