<head>
  <meta charset="UTF-8" />

  <meta property="og:description" content="地図からガチャガチャスポットを検索。現在地・駅名・エリアから周辺のスポットを探せます。" />
  <meta property="og:url" content="https://gacha-hiroba.com/map.html" />
  <meta property="og:image" content="https://gacha-hiroba.com/assets/ogp.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="stylesheet" href="styles.css" />
  <!-- OpenStreetMap (Leaflet) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin="" defer></script>
  <script src="data/spots.js" defer></script>
  <script src="data/ads.js" defer></script>
  <script src="script.js" defer></script>
</head>
<body>
  <header class="gh-header">
    <div class="gh-header__top">
      <div class="gh-container gh-header__inner">
        <a class="gh-logo" href="index.html" aria-label="ガチャひろば トップへ">
          <span class="gh-logo__icon">G</span>
          <span class="gh-logo__text">ガチャ<em>ひろば</em></span>
        </a>
        <form class="gh-search" role="search">
          <input class="gh-search__input" type="search" placeholder="エリア・駅名・店名で検索" aria-label="ガチャ場所を検索" />
          <button class="gh-search__btn" type="submit" aria-label="検索">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          </button>
        </form>
        <nav class="gh-header__nav" aria-label="ユーザーメニュー">
          <a href="#">ログイン</a>
          <a href="#" class="gh-btn gh-btn--sm gh-btn--outline-white">無料登録</a>
        </nav>
        <button class="gh-hamburger" aria-label="メニューを開く" aria-expanded="false">
          <span></span><span></span><span></span>
        </button>
      </div>
    </div>
    <div class="gh-subnav">
      <div class="gh-container">
        <nav class="gh-nav-tabs" aria-label="メインナビゲーション">
          <a href="index.html">トップ</a>
          <a href="board.html">掲示板</a>
          <a href="news.html">新着情報</a>
          <a href="ranking.html">ランキング</a>
          <a href="area.html">エリア別</a>
          <a href="category.html">カテゴリー別</a>
        </nav>
      </div>
    </div>
  </header>

  <main id="main" class="gh-main">
    <div class="gh-container">

      <div class="gh-page-hero">
        <h1 class="gh-page-hero__title">マップ検索</h1>
        <p class="gh-page-hero__desc">現在地・駅名・エリア名から周辺のガチャガチャスポットを地図上で探せます。</p>
      </div>

      <!-- 検索フォーム -->
      <section class="gh-section" style="margin-bottom:0">
        <div class="gh-map-search-bar">
          <form class="gh-map-search-form">
            <div class="gh-map-search-input-wrap">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gh-muted);pointer-events:none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
              <input class="gh-map-search-input" type="search" placeholder="駅名・スポット名・エリアで検索（例: 秋葉原駅）" aria-label="検索キーワード" />
            </div>
            <button type="button" class="gh-btn gh-btn--primary" id="currentLocBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/></svg>
              現在地
            </button>
            <button type="submit" class="gh-btn gh-btn--primary">検索</button>
          </form>

          <!-- フィルター -->
          <div class="gh-map-filters">
            <select class="gh-select" style="width:auto;min-width:120px">
              <option>都道府県</option>
              <option>東京都</option>
              <option>神奈川県</option>
              <option>大阪府</option>
              <option>愛知県</option>
              <option>福岡県</option>
            </select>
            <select class="gh-select" style="width:auto;min-width:130px">
              <option>カテゴリー</option>
              <option>アニメ・キャラ</option>
              <option>フィギュア</option>
              <option>ぬいぐるみ</option>
              <option>食玩・お菓子</option>
            </select>
            <select class="gh-select" style="width:auto;min-width:110px">
              <option>半径 500m</option>
              <option>半径 1km</option>
              <option>半径 3km</option>
              <option>半径 5km</option>
              <option>半径 10km</option>
            </select>
            <select class="gh-select" style="width:auto;min-width:120px">
              <option>台数: すべて</option>
              <option>10台以上</option>
              <option>50台以上</option>
              <option>100台以上</option>
            </select>
          </div>
        </div>
      </section>

      <!-- マップ + リスト -->
      <div class="gh-map-layout">

        <!-- マップエリア (OpenStreetMap / Leaflet) -->
        <div class="gh-map-area">
          <div id="osmMap" class="gh-osm-map" role="application" aria-label="ガチャスポットの地図（OpenStreetMap）"></div>
        </div>

        <!-- リストパネル -->
        <div class="gh-map-list">
          <div class="gh-map-list__header">
            <strong>周辺スポット</strong>
            <span class="gh-map-list__count">読み込み中…</span>
            <button type="button" class="gh-btn gh-btn--primary gh-btn--sm" id="nearbySortBtn" style="font-size:11px;padding:4px 10px">📍 近い順</button>
          </div>

          <!-- 店舗リストは script.js が data/spots.js から実データで描画 -->
          <div data-gh-map-list></div>

          <div class="gh-map-list__footer">
            <a href="area.html" class="gh-btn gh-btn--block">もっと見る</a>
          </div>
        </div>

      </div>

    </div>
  </main>

  <footer class="gh-footer">
    <div class="gh-container">
      <div class="gh-footer__main">
        <div class="gh-footer__brand">
          <a class="gh-logo" href="index.html"><span class="gh-logo__icon">G</span><span class="gh-logo__text">ガチャ<em>ひろば</em></span></a>
          <p>全国のガチャガチャ設置場所情報を網羅。<br />あなたのガチャライフをサポートします。</p>
        </div>
        <div class="gh-footer__links">
          <div><strong>サービス</strong><a href="index.html">トップ</a><a href="ranking.html">ランキング</a><a href="news.html">新着情報</a><a href="map.html">マップ検索</a></div>
          <div><strong>情報</strong><a href="#">ガチャとは</a><a href="#">クチコミを書く</a><a href="#">スポットを登録</a></div>
          <div><strong>サポート</strong><a href="#">お問い合わせ</a><a href="terms.html">利用規約</a><a href="privacy.html">プライバシー</a><a href="advertising.html">広告掲載</a></div>
        </div>
      </div>
      <div class="gh-footer__bottom">
        <span>© 2026 ガチャひろば (gacha-hiroba.com)</span>
        <span>Powered by ガチャひろば</span>
      </div>
    </div>
  </footer>
</body>
</html>
